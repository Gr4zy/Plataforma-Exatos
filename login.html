<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plataforma Exatos</title>

    <link rel="stylesheet" href="/login.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="left">

            <img src="/imgs/LOGO.png" class="logo">

            <span class="bemvindo">
                BEM-VINDO À
            </span>

            <h1>
                Sua plataforma<br>
                de estudos para<br>
                o ENEM e o IFRN
            </h1>

            <p>
                Videoaulas, materiais didáticos, quizzes e ranking
                para você se preparar com excelência.
            </p>

        </div>

        <div class="right">

            <div class="login-box">

                <h2>Entrar na plataforma</h2>

                <span>PIBID com você no ENEM e no IFRN</span>

                <form action="/login" method="POST">
                    <label>E-mail</label>

                    <div class="input-box">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" name="email" required>
                    </div>

                    <label>Senha</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="senha" name="senha" required>
                        <i class="fa-regular fa-eye" id="mostrarSenha"></i>
                    </div>

                    <button type="submit">
                        Entrar
                    </button>

                    <p style="text-align:center; margin-top:20px;">
                        Não possui conta?
                        <a href="/cadastro">Cadastre-se</a>
                    </p>


                </form>

            </div>

        </div>

    </div>
    <script>
        //script para mostrar senha
        const botao = document.getElementById("mostrarSenha");
        const senha = document.getElementById("senha");

        botao.addEventListener("click", () => {

            if (senha.type === "password") {
                senha.type = "text";
                botao.classList.remove("fa-eye");
                botao.classList.add("fa-eye-slash");
            } else {
                senha.type = "password";
                botao.classList.remove("fa-eye-slash");
                botao.classList.add("fa-eye");
            }

        });
    </script>
</body>

</html>
